<!DOCTYPE html>
<html lang="te" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EventPlanner">
<meta name="theme-color" content="#0b0b0d">
<title>📷 Event Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="window._fbLoadErr=true"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" onerror="window._fbLoadErr=true"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" onerror="window._fbLoadErr=true"></script>
<style>
[data-theme="dark"]{--bg:#0b0b0d;--surf:#161618;--card:#1c1c20;--bdr:#28282e;--text:#f0ede8;--muted:#666;--sh:rgba(0,0,0,.5);--tb:#0a0a0c;}
[data-theme="light"]{--bg:#f0efe9;--surf:#fff;--card:#faf9f6;--bdr:#e4e0d6;--text:#1a1a1a;--muted:#888;--sh:rgba(0,0,0,.07);--tb:#fff;}
:root{--acc:#f5c842;--own:#22c55e;--sup:#ef4444;--sky:#38bdf8;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ── LOGIN ── */
.lscr{position:fixed;inset:0;background:var(--bg);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.lscr .logo{font-size:3.2rem;margin-bottom:6px;margin-top:30px;}
.lscr h1{font-family:'Playfair Display',serif;font-size:1.8rem;background:linear-gradient(135deg,#f5c842,#ff9a3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:4px;}
.lscr p{color:var(--muted);font-size:.82rem;margin-bottom:24px;text-align:center;}
.lcard{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:22px;width:100%;max-width:350px;}
.ltabs{display:flex;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:3px;margin-bottom:16px;gap:2px;}
.ltb{flex:1;padding:7px;border:none;background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.ltb.on{background:var(--acc);color:#000;}
.lf{margin-bottom:10px;}
.lf label{display:block;font-size:.65rem;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.lf input{width:100%;background:var(--surf);border:1px solid var(--bdr);color:var(--text);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;}
.lf input:focus{border-color:var(--acc);}
.lbtn{width:100%;background:linear-gradient(135deg,#f5c842,#ff9a3c);color:#000;border:none;padding:11px;border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:4px;font-family:'DM Sans',sans-serif;}
.lerr{color:var(--sup);font-size:.73rem;margin-top:7px;text-align:center;min-height:16px;}

/* ── APP SHELL ── */
#app{display:none;}

/* ── COVER ── */
.cover{position:relative;width:100%;height:200px;overflow:hidden;cursor:pointer;}
.cover-img{width:100%;height:100%;object-fit:cover;display:block;}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2) 0%,rgba(0,0,0,.65) 100%);}
.cover-change{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 9px;border-radius:6px;font-size:.65rem;cursor:pointer;}
.cover-content{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;}
.cover-studio{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);line-height:1.1;}
.cover-stats{display:flex;gap:12px;margin-top:6px;}
.cover-stat{font-size:.7rem;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:4px;}
.cover-stat strong{color:#fff;}
.cover-user-row{position:absolute;top:10px;left:12px;display:flex;align-items:center;gap:7px;cursor:pointer;}
.cover-avatar{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.6);overflow:hidden;background:linear-gradient(135deg,#f5c842,#ff9a3c);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#000;}
.cover-avatar img{width:100%;height:100%;object-fit:cover;}
.cover-uname{color:#fff;font-size:.78rem;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.5);}

/* ── MAIN TABS ── */
.main-tabs{display:flex;background:var(--tb);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50;}
.mt{flex:1;padding:11px 4px;border:none;background:transparent;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;}
.mt.on{color:var(--acc);border-bottom-color:var(--acc);}
.mt span{font-size:.95rem;}

/* ── PAGE ── */
.page{display:none;padding:12px 13px;padding-bottom:80px;}
.page.on{display:block;}

/* ── NEXT EVENT BANNER ── */
.next-ev-banner{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(255,154,60,.08));border:1px solid rgba(245,200,66,.3);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.neb-icon{font-size:1.6rem;flex-shrink:0;}
.neb-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.neb-name{font-weight:700;font-size:.95rem;margin-top:1px;}
.neb-meta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.neb-countdown{background:var(--acc);color:#000;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;margin-left:auto;align-self:flex-start;flex-shrink:0;}

/* ── COMPACT CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-title{font-family:'Playfair Display',serif;font-size:.95rem;}
.cal-nav{display:flex;gap:5px;}
.cal-nb{background:var(--surf);border:1px solid var(--bdr);color:var(--text);width:26px;height:26px;border-radius:50%;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cal-nb:hover{background:var(--acc);color:#000;border-color:var(--acc);}
.cbox{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:10px;}
/* Week-row layout: day labels on left, dates across */
.cal-table{width:100%;border-collapse:collapse;}
.cal-table .cal-day-label{background:var(--surf);border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);padding:4px 5px;font-size:.58rem;font-weight:700;color:var(--muted);white-space:nowrap;text-align:center;width:32px;vertical-align:top;}
.cal-table .cal-day-label.sun{color:#ef4444;}
.cal-table .cal-day-label.sat{color:#38bdf8;}
/* keep old classes for JS compatibility */
.ch{display:none;}
.cg{display:none;}
.cc{border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);padding:2px 2px 2px;cursor:pointer;transition:background .15s;vertical-align:top;}
.cc:hover:not(.emp){background:rgba(245,200,66,.06);}
.cc.emp{cursor:default;background:rgba(0,0,0,.04);}
.cc.tod .dn{background:var(--acc);color:#000;font-weight:700;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.cc.sd2{background:rgba(245,200,66,.1);outline:2px solid rgba(245,200,66,.4);outline-offset:-2px;}
.dn{font-size:.68rem;font-weight:600;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px auto;}
/* events grid: 2 per row */
.ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;}
.ed{border-radius:3px;padding:1px 2px;font-size:.4rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;}
.ed.own{background:rgba(34,197,94,.2);color:var(--own);border-left:2px solid var(--own);}
.ed.sup{background:rgba(239,68,68,.2);color:var(--sup);border-left:2px solid var(--sup);}
.ed.sky{background:rgba(56,189,248,.2);color:var(--sky);border-left:2px solid var(--sky);}
.ed.acc{background:rgba(245,200,66,.2);color:var(--acc);border-left:2px solid var(--acc);}
.ed.mb{font-size:.44rem;color:var(--muted);background:var(--bdr);border-left:none;cursor:pointer;}
/* Day popup */
.day-popup{position:fixed;z-index:200;background:var(--card);border:1.5px solid var(--acc);border-radius:14px;padding:14px;min-width:220px;max-width:88vw;box-shadow:0 8px 32px rgba(0,0,0,.5);font-family:'DM Sans',sans-serif;}
.day-popup-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.day-popup-title{font-weight:700;font-size:.9rem;color:var(--acc);}
.day-popup-ev{padding:6px 8px;border-radius:8px;margin-bottom:5px;font-size:.78rem;cursor:pointer;}
.day-popup-add{width:100%;background:linear-gradient(135deg,#f5c842,#ff9a3c);color:#000;border:none;padding:8px;border-radius:8px;font-weight:700;font-size:.78rem;cursor:pointer;margin-top:6px;}

/* ── LEGEND ── */
.lgnd{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:3px;font-size:.63rem;color:var(--muted);}
.ld{width:7px;height:7px;border-radius:2px;}

/* ── UPCOMING LIST ── */
.sec-title{font-family:'Playfair Display',serif;font-size:.95rem;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.up-item{display:flex;gap:9px;padding:9px;background:var(--card);border:1px solid var(--bdr);border-radius:11px;margin-bottom:7px;cursor:pointer;transition:all .15s;}
.up-item:hover{transform:translateX(2px);}
.up-dc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:36px;background:var(--surf);border-radius:7px;padding:4px 3px;flex-shrink:0;}
.up-num{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;line-height:1;}
.up-day{font-size:.52rem;color:var(--muted);text-transform:uppercase;}
.up-mon{font-size:.52rem;color:var(--acc);font-weight:600;margin-top:1px;}
.up-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;}
.up-stripe.own{background:var(--own);}.up-stripe.sup{background:var(--sup);}.up-stripe.sky{background:var(--sky);}
.up-body{flex:1;min-width:0;}
.up-name{font-weight:600;font-size:.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.up-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.utag{font-size:.6rem;padding:1px 5px;border-radius:4px;background:var(--bdr);color:var(--muted);}
.up-person{font-size:.68rem;color:var(--muted);margin-top:3px;}
.up-loc{font-size:.67rem;color:var(--muted);margin-top:1px;}
.days-chip{font-size:.6rem;font-weight:700;color:var(--acc);margin-top:3px;}
.up-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ubadge{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:10px;}
.bo{background:rgba(34,197,94,.15);color:var(--own);}.bs{background:rgba(239,68,68,.15);color:var(--sup);}
.bsky{background:rgba(56,189,248,.15);color:var(--sky);}
.ucta{display:flex;gap:3px;}
.ucbtn{background:none;border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:.62rem;transition:all .14s;}
.ucbtn.ph{color:var(--own);border-color:var(--own);}.ucbtn.wa{color:#25D366;border-color:#25D366;}

/* ── MY EVENTS FORM ── */
.form-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;}
.fc-title{font-family:'Playfair Display',serif;font-size:.9rem;margin-bottom:12px;color:var(--acc);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:.66rem;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surf);border:1px solid var(--bdr);color:var(--text);border-radius:7px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:.84rem;outline:none;transition:border .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);}
.fg select option{background:var(--surf);}
.inline2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ttog{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tb2x{background:var(--surf);border:2px solid var(--bdr);color:var(--muted);padding:7px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .17s;text-align:center;}
.tb2x.oa{border-color:var(--own);color:var(--own);background:rgba(34,197,94,.09);}
.tb2x.sa{border-color:var(--sup);color:var(--sup);background:rgba(239,68,68,.09);}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.catb{background:var(--surf);border:2px solid var(--bdr);color:var(--muted);padding:6px 3px;border-radius:7px;cursor:pointer;font-size:.65rem;font-weight:600;transition:all .17s;text-align:center;line-height:1.4;}
.catb.on{border-color:var(--acc);color:var(--acc);background:rgba(245,200,66,.09);}
/* sub events */
.sub-section{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:10px;margin-bottom:10px;}
.sub-section h4{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;}
.sub-ev-item{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:9px;margin-bottom:6px;position:relative;}
.sub-ev-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.sub-ev-name{font-size:.78rem;font-weight:600;color:var(--acc);}
.sub-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;}
/* requirements */
.req-item{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.req-item input{flex:1;}
.req-add{background:none;border:1px dashed var(--bdr);color:var(--muted);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:.72rem;width:100%;transition:all .15s;}
.req-add:hover{border-color:var(--acc);color:var(--acc);}
/* budget */
.budget-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.adv-check{display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer;margin-top:6px;}
.adv-check input{accent-color:var(--acc);}
/* action btns */
.action-btns{display:flex;gap:7px;flex-wrap:wrap;}
.abtn{flex:1;min-width:80px;padding:10px 6px;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;}
.abtn.save{background:linear-gradient(135deg,#f5c842,#ff9a3c);color:#000;}
.abtn.pdf{background:var(--surf);border:1px solid var(--bdr);color:var(--text);}
.abtn.wa{background:#25D366;color:#fff;}
/* sheets section */
.sheets-section{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:10px;margin-bottom:10px;}
.sheets-section h4{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;}
.sheet-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.sheet-type{background:var(--card);border:1px solid var(--bdr);color:var(--text);border-radius:6px;padding:5px 7px;font-size:.75rem;font-family:'DM Sans',sans-serif;outline:none;min-width:100px;}
.sheet-count{width:60px;background:var(--card);border:1px solid var(--bdr);color:var(--text);border-radius:6px;padding:5px 7px;font-size:.75rem;font-family:'DM Sans',sans-serif;outline:none;}

/* ── EVENT DETAIL VIEW ── */
.det-header{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(255,154,60,.08));border:1px solid rgba(245,200,66,.25);border-radius:14px;padding:14px;margin-bottom:10px;}
.det-back{background:none;border:none;color:var(--acc);font-size:.8rem;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:4px;padding:0;}
.det-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
.det-studio-line{font-size:.72rem;color:var(--muted);margin-top:3px;}
.det-section{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:8px;}
.det-sec-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;font-weight:700;}
.det-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:.78rem;}
.det-row:last-child{border-bottom:none;}
.det-row strong{color:var(--acc);}
.sub-timeline{display:flex;flex-direction:column;gap:8px;}
.stl-item{display:flex;gap:10px;align-items:flex-start;}
.stl-dot{width:10px;height:10px;border-radius:50%;background:var(--sky);flex-shrink:0;margin-top:4px;}
.stl-content{flex:1;}
.stl-name{font-size:.82rem;font-weight:600;}
.stl-date{font-size:.7rem;color:var(--muted);}

/* ── REPORTS ── */
.rsec{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:12px;margin-bottom:9px;}
.rtit{font-family:'Playfair Display',serif;font-size:.88rem;margin-bottom:9px;}
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.fchip{background:var(--surf);border:1px solid var(--bdr);color:var(--muted);padding:4px 9px;border-radius:20px;font-size:.68rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.fchip.on{background:var(--acc);color:#000;border-color:var(--acc);}
.drrow{display:flex;gap:5px;margin-bottom:7px;}
.drrow input{flex:1;background:var(--surf);border:1px solid var(--bdr);color:var(--text);border-radius:7px;padding:5px 8px;font-size:.72rem;font-family:'DM Sans',sans-serif;outline:none;}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:.76rem;}
.rrow:last-child{border-bottom:none;}.rval{font-weight:700;color:var(--acc);}
.rbi{margin-bottom:6px;}
.rbl{display:flex;justify-content:space-between;font-size:.66rem;margin-bottom:2px;}
.rb{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;}
.rbf{height:100%;background:linear-gradient(90deg,#f5c842,#ff9a3c);border-radius:3px;transition:width .5s;}

/* ── PROFILE MODAL ── */
.pmo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:flex-end;justify-content:center;padding:10px;}
.pmo.on{display:flex;}
.psheet{background:var(--card);border:1px solid var(--bdr);border-radius:22px 22px 14px 14px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:18px;animation:suu .25s ease;position:relative;}
@keyframes suu{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.pcls{position:absolute;top:12px;right:12px;background:var(--bdr);border:none;color:var(--text);width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.pf-title{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:14px;}
.pf-av{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#f5c842,#ff9a3c);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#000;overflow:hidden;margin:0 auto 12px;}
.pf-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pf-sec-t{font-size:.63rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:10px 0 6px;font-weight:700;}
.eq-grid{display:flex;flex-wrap:wrap;gap:4px;}
.eqc{display:flex;align-items:center;gap:3px;background:var(--surf);border:1px solid var(--bdr);border-radius:5px;padding:3px 7px;cursor:pointer;font-size:.7rem;transition:all .13s;}
.eqc:has(input:checked){border-color:var(--acc);color:var(--acc);}
.eqc input{display:none;}

.fab{position:fixed;bottom:20px;right:18px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#f5c842,#ff9a3c);border:none;color:#000;font-size:1.35rem;cursor:pointer;box-shadow:0 4px 16px rgba(245,200,66,.45);z-index:100;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
.fab:hover{transform:scale(1.1);}
input[type=file]{display:none;}
/* ── BACKUP MODAL ── */
.bkup-mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:center;justify-content:center;padding:16px;}

async function dbSet(col,id,data){if(fbOk){try{await db.collection(col).doc(id).set(data,{merge:true});return;}catch(e){}}const s=JSON.parse(localStorage.getItem('dp_'+col)||'{}');s[id]=data;localStorage.setItem('dp_'+col,JSON.stringify(s));}

function dbListen(col,filter,cb){if(fbOk){try{let q=db.collection(col);if(filter)q=q.where(filter[0],filter[1],filter[2]);return q.onSnapshot(snap=>cb(snap.docs.map(d=>({...d.data(),_id:d.id}))));} catch(e){}}return null;}

let users=JSON.parse(localStorage.getItem('ppUsers')||'[]');

async function launchApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('fab').style.display='flex';
  updCover();renAll();renMyEvList();
  const t=new Date();
  document.getElementById('dfr').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-01`;
  document.getElementById('dto').value=fmt(new Date(t.getFullYear(),t.getMonth()+1,0));

  // ── Firebase Realtime Requests Listener ──
  if(cu&&fbOk&&db){
    db.collection('requests').where('uid','==',cu.id).onSnapshot(snap=>{
      const incoming=snap.docs.map(d=>({...d.data(),id:d.id}));
      // Find new unseen requests not yet in local
      const localIds=requests.map(r=>r.id);
      const newOnes=incoming.filter(r=>!localIds.includes(r.id));
      if(newOnes.length){
        newOnes.forEach(r=>requests.push(r));
        localStorage.setItem('ppReqs',JSON.stringify(requests));
        updReqBadge();
        toast(`🔔 ${newOnes.length} కొత్త request వచ్చింది! Requests tab చూడండి.`,4000);
      } else {
        // Update existing
        requests=incoming;
        localStorage.setItem('ppReqs',JSON.stringify(requests));
        updReqBadge();
      }
      if(document.getElementById('pg-req')?.classList.contains('on'))renReqList();
    },()=>{});
  }
  updReqBadge();
}

// ══ COVER ══
function updCover(){
  if(!cu)return;
  document.getElementById('covStudio').textContent=cu.studio||'My Studio';
  document.getElementById('covUname').textContent=cu.name||'User';
  const av=document.getElementById('covAv');
  if(cu.photo){av.innerHTML=`<img src="${cu.photo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  else{av.textContent=(cu.name||'P').charAt(0).toUpperCase();}
  if(cu.cover)document.getElementById('coverImg').src=cu.cover;
  const todayStr=fmt(now),dim=new Date(cy,cm+1,0).getDate();
  let busy=0;
  for(let d=1;d<=dim;d++){const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(evs.some(e=>e.date===ds||e.subEvs?.some(se=>se.date===ds)))busy++;}
  document.getElementById('csFree').textContent=dim-busy;
  document.getElementById('csBusy').textContent=busy;
  document.getElementById('csUp').textContent=evs.filter(e=>e.date>=todayStr).length;
}
function changeCover(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{cu.cover=e.target.result;const ui=users.findIndex(u=>u.id===cu.id);if(ui>-1)users[ui]=cu;saveUsers();saveCu();document.getElementById('coverImg').src=e.target.result;};r.readAsDataURL(f);}

// ══ CALENDAR ══
function chM(d){cm+=d;if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}renAll();}
function renAll(){updCover();renCal();renNextEv();renUpcoming();}
function renCal(){
  document.getElementById('calTitle').textContent=MN[cm]+' '+cy;
  var tbody=document.getElementById('calBody');
  tbody.innerHTML='';
  var DAY_LABELS=[
    {label:'ఆది',cls:'sun'},
    {label:'సోమ',cls:''},
    {label:'మంగళ',cls:''},
    {label:'బుధ',cls:''},
    {label:'గురు',cls:''},
    {label:'శుక్ర',cls:''},
    {label:'శని',cls:'sat'}
  ];
  var fd=new Date(cy,cm,1).getDay(); // 0=Sun
  var dim=new Date(cy,cm+1,0).getDate();
  var ts=fmt(now);

  // Build a 7-row table: each row = one day-of-week, columns = weeks
  // Calculate how many week-columns we need
  var totalCells=fd+dim;
  var numWeeks=Math.ceil(totalCells/7);

  // Pre-build dayEvs map: key=dateStr, val=array
  var evMap={};
  evs.forEach(function(ev){
    function addToMap(ds,obj){if(!evMap[ds])evMap[ds]=[];evMap[ds].push(obj);}
    if(ev.date)addToMap(ev.date,{name:ev.name,type:ev.type==='own'?'own':'sup',id:ev.id,time:ev.mainTime||''});
    (ev.subEvs||[]).forEach(function(s){
      if(s.date)addToMap(s.date,{name:s.name,type:'sky',id:ev.id,time:s.time||''});
      if(s.groomDate)addToMap(s.groomDate,{name:s.name+' (పెళ్ళికొడుకు)',type:'own',id:ev.id,time:s.groomTime||''});
      if(s.brideDate)addToMap(s.brideDate,{name:s.name+' (పెళ్లికూతురు)',type:'sup',id:ev.id,time:s.brideTime||''});
    });
  });

  for(var dow=0;dow<7;dow++){
    var tr=document.createElement('tr');
    // Day label cell
    var th=document.createElement('td');
    th.className='cal-day-label'+(DAY_LABELS[dow].cls?' '+DAY_LABELS[dow].cls:'');
    th.textContent=DAY_LABELS[dow].label;
    tr.appendChild(th);

    // Week columns
    for(var week=0;week<numWeeks;week++){
      var cellIndex=week*7+dow; // position in the full 7*numWeeks grid
      var dayNum=cellIndex-fd+1; // actual date number

      var td=document.createElement('td');
      if(dayNum<1||dayNum>dim){
        td.className='cc emp';
        // no border on last col
        if(week===numWeeks-1) td.style.borderRight='none';
        tr.appendChild(td);
        continue;
      }

      // Build date string
      (function(day,tdEl,wk){
        var ds=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        var dayEvs=evMap[ds]||[];
        tdEl.className='cc'+(ds===ts?' tod':'')+(ds===sd?' sd2':'');
        if(wk===numWeeks-1) tdEl.style.borderRight='none';
        tdEl.onclick=function(e){e.stopPropagation();showDayPopup(ds,dayEvs,tdEl);};
        var dn=document.createElement('div');dn.className='dn';dn.textContent=day;tdEl.appendChild(dn);
        if(dayEvs.length){
          var grid=document.createElement('div');grid.className='ev-grid';
          dayEvs.forEach(function(ev){
            var dot=document.createElement('div');
            dot.className='ed '+ev.type;
            var t=ev.time?fmt12(ev.time)+' ':'';
            dot.textContent=t+ev.name.slice(0,7);
            dot.title=ev.name+(ev.time?' · '+fmt12(ev.time):'');
            grid.appendChild(dot);
          });
          // if odd count, last item spans 2 cols
          if(dayEvs.length%2===1){
            grid.lastChild.style.gridColumn='span 2';
          }
          tdEl.appendChild(grid);
        }
      })(dayNum,td,week);

      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  // close any open popup when clicking outside
  document.onclick=function(){closeDayPopup();};
}

function showDayPopup(ds,dayEvs,cellEl){
  closeDayPopup();
  sd=ds; renCal();
  var popup=document.createElement('div');
  popup.id='dayPopup';
  popup.onclick=function(e){e.stopPropagation();};
  var rect=cellEl.getBoundingClientRect();
  var left=Math.min(rect.left,window.innerWidth-244);
  var top=rect.bottom+6;
  if(top+280>window.innerHeight) top=rect.top-290;
  popup.style.cssText='position:fixed;left:'+Math.max(6,left)+'px;top:'+Math.max(6,top)+'px;z-index:500;background:var(--card);border:1.5px solid var(--acc);border-radius:14px;padding:14px;min-width:230px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.65);font-family:DM Sans,sans-serif';
  var d=new Date(ds+'T00:00:00');
  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
  var htitle=document.createElement('div');
  htitle.style.cssText='font-weight:700;font-size:.9rem;color:var(--acc)';
  htitle.textContent='📅 '+d.getDate()+' '+MN[d.getMonth()]+' '+d.getFullYear();
  var hclose=document.createElement('button');
  hclose.style.cssText='background:var(--bdr);border:none;color:var(--text);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.85rem';
  hclose.textContent='✕';hclose.onclick=closeDayPopup;
  hdr.appendChild(htitle);hdr.appendChild(hclose);
  popup.appendChild(hdr);
  // Events list
  if(dayEvs.length){
    dayEvs.forEach(function(ev){
      var bg=ev.type==='own'?'rgba(34,197,94,.12)':ev.type==='sup'?'rgba(239,68,68,.12)':'rgba(56,189,248,.12)';
      var cl=ev.type==='own'?'#22c55e':ev.type==='sup'?'#ef4444':'#38bdf8';
      var card=document.createElement('div');
      card.style.cssText='padding:7px 9px;border-radius:8px;margin-bottom:5px;font-size:.78rem;cursor:pointer;background:'+bg+';border-left:3px solid '+cl;
      var nm=document.createElement('div');nm.style.cssText='font-weight:700;color:var(--text)';nm.textContent=ev.name;
      card.appendChild(nm);
      if(ev.time){var tm=document.createElement('div');tm.style.cssText='font-size:.68rem;color:var(--muted);margin-top:2px';tm.textContent='🕐 '+fmt12(ev.time);card.appendChild(tm);}
      (function(eid){card.onclick=function(){closeDayPopup();openEvById(eid);};})(ev.id);
      popup.appendChild(card);
    });
  } else {
    var empty=document.createElement('div');
    empty.style.cssText='text-align:center;color:var(--muted);font-size:.75rem;padding:8px';
    empty.textContent='ఈ రోజు events లేవు';
    popup.appendChild(empty);
  }
  // Add button
  var addBtn=document.createElement('button');
  addBtn.style.cssText='width:100%;background:linear-gradient(135deg,#f5c842,#ff9a3c);color:#000;border:none;padding:9px;border-radius:9px;font-weight:700;font-size:.78rem;cursor:pointer;margin-top:8px';
  addBtn.textContent='➕ ఈ తేదీకి Event Add చేయండి';
  (function(dstr){addBtn.onclick=function(){closeDayPopup();openSchedMo(dstr);};})(ds);
  popup.appendChild(addBtn);
  document.body.appendChild(popup);
}
function closeDayPopup(){var p=document.getElementById('dayPopup');if(p)p.remove();}
function renNextEv(){
  const todayStr=fmt(now);
  const all=[];evs.forEach(ev=>{all.push({date:ev.date,name:ev.name,type:ev.type,loc:ev.location,id:ev.id,isSub:false});(ev.subEvs||[]).forEach(se=>{if(se.date)all.push({date:se.date,name:`${ev.name} — ${se.name}`,type:'sky',loc:se.location||ev.location,id:ev.id,isSub:true});});});
  const next=all.filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const banner=document.getElementById('nextEvBanner');
  if(!next){banner.innerHTML='';return;}
  const diff=Math.round((new Date(next.date+'T00:00:00')-new Date(todayStr+'T00:00:00'))/(86400000));
  const chip=diff===0?'⚡ ఈరోజు!':diff===1?'🔔 రేపు!':diff+' రోజులలో';
  banner.innerHTML=`<div class="next-ev-banner" onclick="openEvById('${next.id}')"><div class="neb-icon">${next.type==='own'?'🟢':next.type==='support'?'🔴':'🔵'}</div><div style="flex:1;min-width:0"><div class="neb-title">Next Event</div><div class="neb-name">${next.name}</div><div class="neb-meta">${next.date}${next.loc?' · '+next.loc:''}</div></div><div class="neb-countdown">${chip}</div></div>`;
}
function renUpcoming(){
  const todayStr=fmt(now);
  const all=[];evs.forEach(ev=>{all.push({date:ev.date,name:ev.name,type:ev.type,loc:ev.location,person:ev.clientName,phone:ev.clientPhone,cat:ev.cat,subs:ev.subEvs,id:ev.id,camera:ev.camera,isSub:false});(ev.subEvs||[]).forEach(se=>{if(se.date)all.push({date:se.date,name:se.name,parentName:ev.name,type:'sky',loc:se.location||ev.location,person:ev.clientName,phone:ev.clientPhone,id:ev.id,isSub:true,time:se.time});});});
  const upcoming=all.filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('upCountBadge').textContent=upcoming.length;
  const ul=document.getElementById('upList');
  if(!upcoming.length){ul.innerHTML='<div style="text-align:center;padding:16px;color:var(--muted);font-size:.78rem">📭 రాబోయే events లేవు</div>';return;}
  ul.innerHTML=upcoming.map(e=>{
    const d=new Date(e.date+'T00:00:00');
    const diff=Math.round((d-new Date(todayStr+'T00:00:00'))/86400000);
    const dstr=diff===0?'⚡ ఈరోజు!':diff===1?'🔔 రేపు!':diff+' రోజులలో';
    const ph=e.phone||'';
    return`<div class="up-item" onclick="openEvById('${e.id}')">
      <div class="up-dc"><div class="up-num">${d.getDate()}</div><div class="up-day">${SN[d.getDay()]}</div><div class="up-mon">${MN[d.getMonth()].slice(0,3)}</div></div>
      <div class="up-stripe ${e.type==='own'?'own':e.type==='support'?'sup':'sky'}"></div>
      <div class="up-body">
        <div class="up-name">${e.name}${e.isSub&&e.parentName?` <span style="color:var(--muted);font-size:.7rem">(${e.parentName})</span>`:''}</div>
        <div class="up-tags">${e.cat?`<span class="utag">${CATS[e.cat]||e.cat}</span>`:''} ${e.time?`<span class="utag">🕐 ${e.time}</span>`:''} ${e.camera?`<span class="utag">${e.camera==='with'?'📷':'🚫'}</span>`:''}</div>
        ${e.person?`<div class="up-person">👤 ${e.person}${ph?' · '+ph:''}</div>`:''}
        ${e.loc?`<div class="up-loc">📍 ${e.loc}</div>`:''}
        <div class="days-chip">${dstr}</div>
      </div>
      <div class="up-right">
        <div class="ubadge ${e.type==='own'?'bo':e.type==='support'?'bs':'bsky'}">${e.type==='own'?'Own':e.type==='support'?'Sup':'Sub'}</div>
        ${ph?`<div class="ucta"><button class="ucbtn ph" onclick="event.stopPropagation();cph('${ph}')">📞</button><button class="ucbtn wa" onclick="event.stopPropagation();cwa('${ph}')">💬</button></div>`:''}
      </div>
    </div>`;
  }).join('');
}
function cph(p){window.location.href=`tel:${p}`;}
function cwa(p){const c=p.replace(/\D/g,'');window.open(`https://wa.me/${c.startsWith('91')?c:'91'+c}`,'_blank');}

function renMyEvList(){
  const el=document.getElementById('myEvCards');
  if(!evs.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:.82rem">📭 Events లేవు<br><small>+ కొత్తది నొక్కండి</small></div>';return;}
  el.innerHTML=[...evs].sort((a,b)=>a.date.localeCompare(b.date)).map(ev=>`<div class="up-item" onclick="openEvById('${ev.id}')">
    <div class="up-dc"><div class="up-num">${ev.date.split('-')[2]}</div><div class="up-day">${SN[new Date(ev.date+'T00:00:00').getDay()]}</div><div class="up-mon">${MN[parseInt(ev.date.split('-')[1])-1].slice(0,3)}</div></div>
    <div class="up-stripe ${ev.type==='own'?'own':'sup'}"></div>
    <div class="up-body">
      <div class="up-name">${ev.name}</div>

let formSubEvs=[],formReqs=[],formSheets=[],formReqG={1:[],2:[],3:[]};
function showAddForm(id){
  editEvId=id||null;
  document.getElementById('evListView').style.display='none';
  document.getElementById('evFormView').style.display='block';
  document.getElementById('evDetailView').style.display='none';
  formSubEvs=[];formReqs=[];formSheets=[];formReqG={1:[],2:[],3:[]};
  const ev=id?evs.find(e=>e.id===id):null;
  if(ev){formSubEvs=JSON.parse(JSON.stringify(ev.subEvs||[]));formReqs=JSON.parse(JSON.stringify(ev.requirements||[]));formSheets=JSON.parse(JSON.stringify(ev.sheets||[]));formReqG={1:[...(ev.reqGroup1||[])],2:[...(ev.reqGroup2||[])],3:[...(ev.reqGroup3||[])]};}
  document.getElementById('evFormContent').innerHTML=buildForm(ev);
  setTimeout(()=>{highlightCat(ev?.cat||'wedding');if(ev?.type==='support'){document.getElementById('bown').className='tb2x';document.getElementById('bsup').className='tb2x sa';const cc=document.getElementById('camCard');if(cc)cc.style.display='block';}},30);

function showListView(){document.getElementById('evListView').style.display='block';document.getElementById('evFormView').style.display='none';document.getElementById('evDetailView').style.display='none';renMyEvList();}
function editEv(id){swPage('myev');showAddForm(id);}
function openEvById(id){
  const ev=evs.find(e=>e.id===id);if(!ev)return;
  if(document.getElementById('pg-myev').className.includes('on')){document.getElementById('evListView').style.display='none';document.getElementById('evFormView').style.display='none';document.getElementById('evDetailView').style.display='block';document.getElementById('evDetailContent').innerHTML=buildDetail(ev);}
  else{swPage('myev');setTimeout(()=>{document.getElementById('evListView').style.display='none';document.getElementById('evDetailView').style.display='block';document.getElementById('evDetailContent').innerHTML=buildDetail(ev);},50);}
}

// ══ SYNC WEDDING FIELDS ══
function syncWeddingFields(){
  var date=document.getElementById('fDate')?.value||'';
  var time=document.getElementById('fMainTime')?.value||'';
  var loc=document.getElementById('fLoc')?.value||'';
  // Find Wedding sub-event and sync
  formSubEvs.forEach(function(s,i){
    if(s.name==='Wedding'||s.name==='వెడ్డింగ్'){
      if(date && !s._dateLocked) s.date=date;
      if(time && !s._timeLocked) s.time=time;
      if(loc && !s._locLocked) s.location=loc;
    }
  });
  refreshSubList();
}
function syncMainFromWedding(i){
  var s=formSubEvs[i];
  if(!s||(s.name!=='Wedding'&&s.name!=='వెడ్డింగ్'))return;
  var dateEl=document.getElementById('fDate');
  var timeEl=document.getElementById('fMainTime');
  var locEl=document.getElementById('fLoc');
  if(s.date&&dateEl&&!dateEl.value) dateEl.value=s.date;
  if(s.time&&timeEl&&!timeEl.value) timeEl.value=s.time;
  if(s.location&&locEl&&!locEl.value) locEl.value=s.location;
}

// ══ AUTO EVENT NAME ══
function autoEvName(){
  const g=document.getElementById('fGroom')?.value.trim()||'';
  const b=document.getElementById('fBride')?.value.trim()||'';
  const cat=document.getElementById('fCat')?.value||'wedding';
  const catLabel=CATS[cat]||cat;
  let name='';
  if(g&&b)name=`${g} & ${b} ${catLabel.replace(/[^\u0C00-\u0C7Fa-zA-Z\s]/g,'').trim()}`;
  else if(g)name=`${g} ${catLabel.replace(/[^\u0C00-\u0C7Fa-zA-Z\s]/g,'').trim()}`;
  else if(b)name=`${b} ${catLabel.replace(/[^\u0C00-\u0C7Fa-zA-Z\s]/g,'').trim()}`;
  document.getElementById('fEvName').value=name;
  const d=document.getElementById('evNameDisplay');
  if(d)d.textContent=name||'—';
}

  if(!d.date){toast('⚠️ తేదీ తప్పనిసరి!');return;}
  if(editEvId){const i=evs.findIndex(e=>e.id===editEvId);if(i>-1)evs[i]=d;}else evs.push(d);
  saveEvs();renAll();showListView();toast('✅ Save అయింది!');
}

function getBaseUrl(){
  // Works on GitHub Pages, local, and any static host
  const loc=window.location;
  const base=loc.origin+loc.pathname;
  return base.endsWith('/')?base.slice(0,-1):base;
}
function genClientLink(){
  const d=getFormData();
  if(!d.date){toast('⚠️ ముందు date ఇవ్వండి');return;}
  if(!editEvId){evs.push(d);editEvId=d.id;saveEvs();}
  else{const i=evs.findIndex(e=>e.id===editEvId);if(i>-1)evs[i]=d;else{evs.push(d);}saveEvs();}
  const base=getBaseUrl();
  const link=`${base}?mode=clientform&uid=${encodeURIComponent(cu?.id||'')}&evid=${encodeURIComponent(editEvId)}`;

function delEv(id){
  const reasons=['1. Client Cancel చేసారు','2. Date Conflict','3. Payment రాలేదు','4. Client మారారు','5. తప్పుగా Add అయింది','6. ఇతర కారణం'];
  const r=prompt('Delete కారణం select చేయండి:\n\n'+reasons.join('\n')+'\n\n(number టైప్ చేయండి: 1-6)');
  if(!r)return;
  const num=parseInt(r);
  if(!num||num<1||num>6){alert('Valid number (1-6) ఇవ్వండి');return;}
  if(!confirm(`కారణం: ${reasons[num-1]}\n\nDelete చేయాలా? ఇది తిరిగి రాదు!`))return;
  evs=evs.filter(e=>e.id!==id);saveEvs();renAll();showListView();toast('🗑 Deleted — '+reasons[num-1].split('. ')[1]);
}

function genPDF(){const d=getFormData();genPDFData(d);}
function genPDFById(id){const ev=evs.find(e=>e.id===id);if(ev)genPDFData(ev);}
function genPDFData(ev){
  toast('📄 PDF తయారవుతోంది...', 3000);
  const htmlContent = buildPDFData(ev);
  const fname = ((ev.groom||'')+(ev.bride?'_'+ev.bride:'')||ev.name||'Booking').replace(/[^\w]/g,'_')+'_Booking';

  // ── Method: open print window → user saves as PDF ──
  // Works on ALL mobile browsers (Chrome/Samsung/Safari)
  const pw = window.open('', '_blank');
  if(!pw){
    // popup blocked → fallback: data URI download
    _pdfFallbackDownload(htmlContent, fname);
    return;
  }
  pw.document.open();
  pw.document.write(htmlContent);
  pw.document.close();

  // Inject auto-print + save blob for WA share
  pw.onload = function(){
    // store HTML for WA share
    window._lastPdfHtml  = htmlContent;
    window._lastPdfName  = fname + '.pdf';
    window._lastPdfWin   = pw;
    // On mobile Chrome/Samsung: print dialog → "Save as PDF"
    setTimeout(()=>{ try{ pw.print(); }catch(e){} }, 400);
    showPdfWAOption(ev);
  };
  // fallback if onload doesn't fire
  setTimeout(()=>{
    if(!window._lastPdfHtml){
      window._lastPdfHtml = htmlContent;
      window._lastPdfName = fname + '.pdf';
      window._lastPdfWin  = pw;
      showPdfWAOption(ev);
    }
  }, 1200);
}

function _pdfFallbackDownload(htmlContent, fname){
  // Encode as data URI and trigger download
  const blob = new Blob([htmlContent], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = fname + '.html';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  toast('📄 File download అయింది — PDF గా open చేయండి', 4000);
}

  btnWA.style.cssText='flex:1;background:#25D366;color:#fff;border:none;padding:10px;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer';

  btnX.style.cssText='background:var(--surf);border:1px solid var(--bdr);color:var(--muted);padding:10px 14px;border-radius:10px;font-size:.9rem;cursor:pointer';

function sharePdfWA(){
  var b=document.getElementById('pdfWaBanner');
  if(b)b.remove();
  if(window._lastPdfHtml && navigator.share){
    var blob=new Blob([window._lastPdfHtml],{type:'text/html'});
    var file=new File([blob],window._lastPdfName||'Booking.pdf',{type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'Booking PDF'}).then(function(){toast('✅ Shared!');}).catch(function(){_waOpenPrintWin();});
      return;
    }
  }
  _waOpenPrintWin();
}
function _waOpenPrintWin(){
  if(window._lastPdfHtml){
    if(!window._lastPdfWin||window._lastPdfWin.closed){
      window._lastPdfWin=window.open('','_blank');
      if(window._lastPdfWin){
        window._lastPdfWin.document.write(window._lastPdfHtml);
        window._lastPdfWin.document.close();
        setTimeout(function(){try{window._lastPdfWin.print();}catch(e){}},400);
      }
    } else {
      try{window._lastPdfWin.print();}catch(e){}
    }
    toast('Print dialog లో Save as PDF select చేయండి',5000);
  } else {
    toast('ముందు PDF download చేయండి',3000);
  }
}

/* Body */
.body{padding:14px 20px;}
.sec{margin-bottom:13px;}
.sec-hd{display:flex;align-items:center;gap:7px;padding:5px 10px;background:linear-gradient(90deg,rgba(139,26,0,.08),rgba(192,57,10,.03));border-left:3px solid #C0390A;border-radius:0 7px 7px 0;margin-bottom:8px;}
.sec-num{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#C0390A,#f5c842);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:900;flex-shrink:0;}
.sec-ttl{font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:#8B1A00;}

/* Info grid */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ic{background:linear-gradient(135deg,#fff8f0,#fff3e8);border:1px solid rgba(192,57,10,.15);border-radius:8px;padding:7px 10px;}
.ic label{font-size:.52rem;color:#8B1A00;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:2px;font-weight:700;}
.ic strong{font-size:.8rem;font-weight:700;color:#1a0a00;display:block;}

/* Table */
.tbl-wrap{border:1px solid rgba(192,57,10,.2);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{background:linear-gradient(135deg,#8B1A00,#C0390A);color:#fff;padding:7px 10px;font-size:.56rem;letter-spacing:.05em;font-weight:700;text-align:left;}

/* Budget cards */
.bcards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px;}
.bc{border-radius:10px;padding:10px 8px;text-align:center;}
.bc label{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
.bc strong{font-size:1rem;font-weight:900;display:block;}
.bc small{font-size:.56rem;margin-top:2px;display:block;}
.bc-t{background:linear-gradient(135deg,rgba(245,200,66,.15),rgba(245,200,66,.08));border:1.5px solid rgba(245,200,66,.5);}
.bc-t label{color:#C0390A;}.bc-t strong{color:#8B1A00;}
.bc-a{background:linear-gradient(135deg,rgba(139,26,0,.1),rgba(192,57,10,.06));border:1.5px solid rgba(139,26,0,.3);}
.bc-a label{color:#C0390A;}.bc-a strong{color:#8B1A00;}.bc-a small{color:#C0390A;}
.bc-b{background:linear-gradient(135deg,rgba(192,57,10,.08),rgba(139,26,0,.05));border:1.5px solid rgba(192,57,10,.25);}
.bc-b label{color:#8B1A00;}.bc-b strong{color:#C0390A;}

/* Terms */
.terms-box{background:linear-gradient(135deg,#fff8f0,#fff);border:1px solid rgba(192,57,10,.2);border-left:3px solid #C0390A;border-radius:8px;padding:10px 13px;}
.terms-box div{font-size:.72rem;color:#3d1500;padding:2px 0;line-height:1.7;}
.terms-box strong{color:#8B1A00;}

/* Signature */
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:14px;padding-top:12px;border-top:1px dashed rgba(192,57,10,.3);}
.sig-box{text-align:center;}
.sig-line{height:44px;border-bottom:1.5px solid #C0390A;margin-bottom:5px;}
.sig-lbl{font-size:.58rem;color:#C0390A;font-weight:700;text-transform:uppercase;}
.sig-name{font-size:.65rem;color:#666;margin-top:2px;}

/* Footer */
.footer{background:linear-gradient(135deg,#8B1A00,#C0390A);text-align:center;padding:11px 16px;}
.ft-studio{font-family:'Playfair Display',serif;font-size:.88rem;color:#fff;font-weight:700;}
.ft-meta{font-size:.6rem;color:rgba(255,255,255,.7);margin-top:3px;}

/* Action Buttons (screen only) */
.pdf-actions{background:#f5f5f5;padding:12px 16px;display:flex;gap:10px;justify-content:center;border-bottom:1px solid #ddd;}
.pdf-btn{padding:10px 20px;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
.pdf-btn-save{background:linear-gradient(135deg,#f5c842,#ff9a3c);color:#000;}
.pdf-btn-dl{background:linear-gradient(135deg,#8B1A00,#C0390A);color:#fff;}
.pdf-btn-wa{background:#25D366;color:#fff;}

/* Watermark line */
.wm{text-align:center;padding:4px;font-size:.56rem;color:rgba(139,26,0,.35);letter-spacing:.1em;border-top:1px solid rgba(192,57,10,.1);}

@media print{
  .pdf-actions{display:none!important;}
  body,html{background:#fff!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .page{max-width:100%;}
  @page{size:A4 portrait;margin:6mm 8mm;}
}

// ══ IMAGE DOWNLOAD ══
function downloadEvImage(id){
  var ev=evs.find(function(e){return e.id===id;});
  if(!ev){toast('Event కనుగొనలేదు');return;}
  toast('🖼 Image తయారవుతోంది...',3000);
  var studio=cu&&cu.studio?cu.studio:'My Studio';
  var myName=cu&&cu.name?cu.name:'';
  var myPhone=cu&&cu.ph?cu.ph:'';

  var W=800,PAD=32;
  var canvas=document.createElement('canvas');
  canvas.width=W;

  // measure height
  var rows=[];
  rows.push({type:'header'});
  rows.push({type:'names',text:(ev.groom||'')+(ev.bride?' & '+ev.bride:'')});
  rows.push({type:'main',date:ev.date,time:ev.mainTime,loc:ev.location});
  (ev.subEvs||[]).forEach(function(s){
    if(isSplitEvent&&isSplitEvent(s.name)){
      if(s.groomEnabled||s.groomDate) rows.push({type:'sub',name:s.name+' (పెళ్ళికొడుకు)',date:s.groomDate||'',time:s.groomTime||''});
      if(s.brideEnabled||s.brideDate) rows.push({type:'sub',name:s.name+' (పెళ్లికూతురు)',date:s.brideDate||'',time:s.brideTime||''});
    } else {
      rows.push({type:'sub',name:s.name,date:s.date||'',time:s.time||''});
    }
  });
  if(ev.budget) rows.push({type:'budget',budget:ev.budget,advance:ev.advance});
  rows.push({type:'footer',studio:studio,name:myName,phone:myPhone});

  var rowH=52, hdrH=90, footH=50, nameH=64;
  var totalH=hdrH+nameH+56+(rows.filter(function(r){return r.type==='sub';}).length*rowH)+
    (ev.budget?56:0)+footH+PAD*2+80;
  canvas.height=Math.max(totalH,400);

  var ctx=canvas.getContext('2d');
  // Background
  var bg=ctx.createLinearGradient(0,0,W,canvas.height);
  bg.addColorStop(0,'#0b0b1a');bg.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,canvas.height);

  // Header band
  var hg=ctx.createLinearGradient(0,0,W,hdrH);
  hg.addColorStop(0,'#8B1A00');hg.addColorStop(0.5,'#C0390A');hg.addColorStop(1,'#8B1A00');
  ctx.fillStyle=hg;ctx.fillRect(0,0,W,hdrH);

  // Studio name
  ctx.fillStyle='#fff';
  ctx.font='bold 26px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('📷 '+studio,W/2,40);
  ctx.font='14px sans-serif';
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.fillText(myName+(myPhone?' • '+myPhone:''),W/2,64);
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font='12px sans-serif';
  ctx.fillText('BOOKING AGREEMENT',W/2,84);

  var y=hdrH+30;
  // Gold accent line
  var ag=ctx.createLinearGradient(0,0,W,0);
  ag.addColorStop(0,'#f5c842');ag.addColorStop(0.5,'#ff9a3c');ag.addColorStop(1,'#8B1A00');
  ctx.fillStyle=ag;ctx.fillRect(0,y-10,W,4);
  y+=20;

  // Names
  ctx.fillStyle='#f5c842';
  ctx.font='bold 32px serif';
  ctx.textAlign='center';
  var namesText=(ev.groom||'?')+' & '+(ev.bride||'?');
  ctx.fillText(namesText,W/2,y+24);
  y+=50;

  // Category chip
  ctx.fillStyle='rgba(245,200,66,.15)';
  roundRect(ctx,W/2-80,y,160,28,14);ctx.fill();
  ctx.fillStyle='#f5c842';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
  ctx.fillText(CATS&&CATS[ev.cat]?CATS[ev.cat]:ev.cat||'Wedding',W/2,y+19);
  y+=46;

  // Main event row
  if(ev.date||ev.mainTime||ev.location){
    ctx.fillStyle='rgba(255,255,255,.06)';
    roundRect(ctx,PAD,y,W-PAD*2,48,10);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='left';
    var mainStr=(ev.date||'')+(ev.mainTime?' ⏰ '+fmt12(ev.mainTime):'')+(ev.location?' 📍 '+ev.location:'');
    ctx.fillText('💒 Wedding: '+mainStr.slice(0,60),PAD+12,y+20);
    if(ev.clientPhone){ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='12px sans-serif';ctx.fillText('📞 '+ev.clientPhone,PAD+12,y+38);}
    y+=60;
  }

  // Sub events
  (ev.subEvs||[]).forEach(function(s){
    var isSpl=isSplitEvent&&isSplitEvent(s.name);
    var pairs=[];
    if(isSpl){
      if(s.groomDate||s.groomEnabled) pairs.push({name:s.name+' (పెళ్ళికొడుకు)',date:s.groomDate||'',time:s.groomTime||''});
      if(s.brideDate||s.brideEnabled) pairs.push({name:s.name+' (పెళ్లికూతురు)',date:s.brideDate||'',time:s.brideTime||''});
    } else {
      pairs.push({name:s.name,date:s.date||'',time:s.time||''});
    }
    pairs.forEach(function(p){
      ctx.fillStyle='rgba(56,189,248,.08)';
      roundRect(ctx,PAD,y,W-PAD*2,44,8);ctx.fill();
      ctx.fillStyle='#38bdf8';ctx.font='bold 13px sans-serif';ctx.textAlign='left';
      ctx.fillText('📌 '+p.name,PAD+12,y+16);
      ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='12px sans-serif';
      var dstr=p.date+(p.time?' ⏰ '+fmt12(p.time):'');
      ctx.fillText(dstr||'—',PAD+12,y+33);
      y+=52;
    });
  });

  // Budget
  if(ev.budget){
    y+=4;
    ctx.fillStyle='rgba(34,197,94,.1)';
    roundRect(ctx,PAD,y,W-PAD*2,44,8);ctx.fill();
    ctx.fillStyle='#22c55e';ctx.font='bold 13px sans-serif';ctx.textAlign='left';
    ctx.fillText('💰 Package: ₹'+parseInt(ev.budget).toLocaleString(),PAD+12,y+16);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='12px sans-serif';
    if(ev.advance) ctx.fillText('✅ Advance: ₹'+parseInt(ev.advance).toLocaleString(),PAD+12,y+33);
    y+=52;
  }

  // Footer
  y+=12;
  ctx.fillStyle='rgba(245,200,66,.08)';
  ctx.fillRect(0,y,W,footH);
  ctx.fillStyle='rgba(245,200,66,.3)';ctx.fillRect(0,y,W,2);
  ctx.fillStyle='rgba(245,200,66,.6)';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('✦ '+studio+' ✦ Photography Booking ✦',W/2,y+20);
  ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px sans-serif';
  ctx.fillText(new Date().toLocaleDateString('te-IN'),W/2,y+38);

  // Download
  var fname=((ev.groom||'')+(ev.bride?'_'+ev.bride:'')||'Booking').replace(/[^\w]/g,'_')+'_Event.png';
  try{
    canvas.toBlob(function(blob){
      if(blob){
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');a.href=url;a.download=fname;
        document.body.appendChild(a);a.click();
        setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
        toast('✅ Image downloaded!');
      } else { toast('⚠️ Image error'); }
    },'image/png');
  }catch(err){toast('⚠️ '+err.message);}
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ══ CLIENT PDF BUILDER ══
function buildClientPdfHtml(d, fmt12x){
  var f = fmt12x || function(t){
    if(!t) return '';
    var parts = t.split(':'), h = parseInt(parts[0]), m = parseInt(parts[1]);
    if(isNaN(h)) return '';
    return (h%12||12) + ':' + String(m).padStart(2,'0') + ' ' + (h>=12?'PM':'AM');
  };
  function row(label, val){ return '<div class="row"><span>'+label+'</span><strong>'+(val||'—')+'</strong></div>'; }
  function sec(title, body){ return '<div class="sec"><div class="sec-ttl">'+title+'</div>'+body+'</div>'; }
  function splitSec(title, gDate, gTime, bDate, bTime){
    return '<div class="sec"><div class="sec-ttl">'+title+'</div>'
      +'<div class="split-grid">'

// ══ BACKUP & RESTORE ══
function getBackupData(){
  return JSON.stringify({
    version:2,
    exportedAt:new Date().toISOString(),
    cu,users,evs,requests,
    settings:{theme:localStorage.getItem('ppTheme')||'dark'}
  },null,2);
}
function backupDownload(){
  const data=getBackupData();
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const dt=new Date().toISOString().slice(0,10);
  a.download=`EventPlanner_Backup_${dt}.json`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
  toast('💾 Backup downloaded!');
}
function shareBackupWA(){
  const dt=new Date().toISOString().slice(0,10);
  const summary=`📷 *Event Planner Backup*\n\n📅 Date: ${dt}\n👤 User: ${cu?.name||''}\n📊 Events: ${evs.length}\n\n⚠️ Backup file is downloading — share manually via WhatsApp Files.`;
  backupDownload();
  setTimeout(()=>{
    const msg=encodeURIComponent(summary);
    window.open(`https://wa.me/?text=${msg}`,'_blank');
  },1200);
}
function backupToGDrive(){
  const data=getBackupData();
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const dt=new Date().toISOString().slice(0,10);
  a.download=`EventPlanner_Backup_${dt}.json`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},500);
  setTimeout(()=>{
    if(confirm('Google Drive లో save చేయాలా?\n\n(File download అయిన తర్వాత Google Drive కి upload చేయండి)'))
      window.open('https://drive.google.com/drive/my-drive','_blank');
  },1000);
  toast('☁️ File downloading — Drive కి upload చేయండి!',3500);
}
function restoreBackup(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.version){alert('❌ Valid backup file కాదు');return;}
      if(!confirm(`Restore చేయాలా?\n\nEvents: ${d.evs?.length||0}\nUsers: ${d.users?.length||0}\n\n⚠️ Current data replace అవుతుంది!`))return;
      if(d.evs){evs=d.evs;localStorage.setItem('ppEvs',JSON.stringify(evs));}
      if(d.users){users=d.users;localStorage.setItem('ppUsers',JSON.stringify(users));}
      if(d.cu){cu=d.cu;localStorage.setItem('ppCu',JSON.stringify(cu));}
      if(d.settings?.theme){localStorage.setItem('ppTheme',d.settings.theme);document.documentElement.setAttribute('data-theme',d.settings.theme);}
      if(fbOk&&db&&cu){
        db.collection('events').doc(cu.id).set({evs,uid:cu.id,updatedAt:Date.now()},{merge:true}).catch(()=>{});
        db.collection('users').doc(cu.id).set(cu,{merge:true}).catch(()=>{});
      }
      toast('✅ Restore అయింది! Reloading...',2000);
      setTimeout(()=>location.reload(),2000);
    }catch(err){alert('❌ Backup file corrupt: '+err.message);}
  };
  r.readAsText(f);
  inp.value='';
}
